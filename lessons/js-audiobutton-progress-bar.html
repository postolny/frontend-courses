<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добавляем прогресс-бар для аудиокнопки</title>
  <link rel="stylesheet" href="../assets/codemirror/lib/codemirror.css">
  <link rel="stylesheet" href="../assets/codemirror/theme/ayu-dark.css">

<body>
  <div class="page">
    <div class="header">

        <a class="exit" href="#" title="К списку уроков">
          <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">

              <path d="M9 21v-6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v6" />
            </g>
          </svg>
        </a>
        <button onclick="toggleTheme()" class="btn" title="Переключить тему">
          <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
            <path d="M0 0h24v24H0z" fill="none" />
            <path fill="currentColor" d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2S2 6.477 2 12s4.477 10 10 10m0-1.5v-17a8.5 8.5 0 0 1 0 17" />
          </svg>
        </button>
        <button id="copyBtn" class="btn" title="Копировать">
          <svg id="iconCopy" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
            <path d="M0 0h24v24H0z" fill="none" />
            <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
              <path d="M7 9.667A2.667 2.667 0 0 1 9.667 7h8.666A2.667 2.667 0 0 1 21 9.667v8.666A2.667 2.667 0 0 1 18.333 21H9.667A2.667 2.667 0 0 1 7 18.333z" />
              <path d="M4.012 16.737A2 2 0 0 1 3 15V5c0-1.1.9-2 2-2h10c.75 0 1.158.385 1.5 1" />
            </g>
          </svg>
          <svg id="iconCheck" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" style="display:none;">
            <path d="M0 0h24v24H0z" fill="none" />

        <button id="formatBtn" class="btn" title="Форматировать">
          <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">

      <div class="right-buttons">
        <button id="reloadBtn" title="Запустить">Запустить</button>
      </div>
    </div>
    <div class="wrap">
      <div class="panel left">
        <textarea id="code">
<!doctype html>
<html>
<head>
<style>
.icon-pause {
  display: none;
}

.playing .icon-play {
  display: none;
}

.playing .icon-pause {
  display: block;
}

#wrap {
  display: flex;
  /* выравниваем по вертикали */
  align-items: center;
  /* промежуток между кнопкой и прогресс-баром */
  gap: 5px;
  width: 100%;
  max-width: 200px;   
}

button {
  /* flex-shrink: 0; */
  width: 32px;
  height: 32px;
  padding: 3px;
  border: 2px solid black;
  border-radius: 50%;
}

.progress-bar {
  /* заставляем прогресс-бар занять всё оставшееся место рядом с кнопкой, чтобы кнопка не сжалась во флекс-контейнере или можно задать flex-shrink: 0 или flex: none (эквивалентно flex: 0 0 auto) для кнопки, чтобы запретить ей сжиматься */
  /* flex: 1 - это сокращённая запись flex: 1 1 0 (flex-grow: 1; flex-shrink: 1; flex-basis: 0%;) */
  flex: 1;
  width: 100%;
  height: 8px;
  background: #ddd;
  border-radius: 3px;
}

.progress-fill {
  height: 100%;
  background: #16a085;
  border-radius: 3px;
  width: 0%;
}
</style>
</head>
<body>

<audio id="player" src="../audio/bach-carl-philipp-emanuel-march.mp3" preload="auto"></audio>

<div id="wrap">
  <button id="play-pause">
    <svg class="icon-play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M0 0h24v24H0z" fill="none" />
      <path fill="currentColor" d="M6 4v16a1 1 0 0 0 1.524.852l13-8a1 1 0 0 0 0-1.704l-13-8A1 1 0 0 0 6 4" />
    </svg>
    <svg class="icon-pause" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M0 0h24v24H0z" fill="none" />
      <path fill="currentColor" d="M9 4H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2m8 0h-2a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2" />
    </svg>
  </button>
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<p>Карл Филипп Эмануэль Бах — Марш ре мажор (BWV Anh. 122).</p>

<script>
const player = document.getElementById("player");
const playPause = document.getElementById("play-pause");
// или
/*
const player = document.querySelector("#player");
const playPause = document.querySelector("#play-pause");
*/
const progressBar = document.getElementById("progressBar");
const progressFill = document.getElementById("progressFill");

playPause.addEventListener("click", () => {
  if (player.paused) {
    player.play();
  } else {
    player.pause();
  }
});

player.addEventListener("play", () => {
  playPause.classList.add("playing");
});

player.addEventListener("pause", () => {
  console.log(player.currentTime);
  playPause.classList.remove("playing");
});

player.addEventListener("ended", () => {
  player.currentTime = 0;
  playPause.classList.remove("playing");
});

// варианты
/*
player.addEventListener("play", () => {
  playPause.querySelector(".icon-play").style.display = "none";
  playPause.querySelector(".icon-pause").style.display = "";
});

// или
.hidden {
  display: none;
}
player.addEventListener("play", () => {
  playPause.querySelector(".icon-play").classList.add("hidden");
  playPause.querySelector(".icon-pause").classList.remove("hidden");
});

// в pause и ended делаем наоборот
*/

// в обработчике событие timeupdate срабатывает каждый раз, когда во время воспроизведения меняется текущее время
player.addEventListener("timeupdate", () => {
  // чтобы вычислить какая часть трека уже воспроизведена делим текущее время (currentTime) на общую продолжительность трека (duration) и получаем число от 0 до 1, результат умножаем на 100, чтобы перевести в проценты
  const percent = (player.currentTime / player.duration) * 100;
  // изменяем CSS-свойство width у .progress-fill, присваивая %
  progressFill.style.width = percent + "%";
  // или с шаблонной строкой
  // progressFill.style.width = `${percent}%`;
});
</script>

</body>
</html>
        </textarea>
      </div>
      <div class="panel right">
        <iframe id="output"></iframe>

    </div>

</body>
