        </button>
        <button id="formatBtn" class="btn" title="Форматировать">
          <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
            <path d="M0 0h24v24H0z" fill="none" />
            <path fill="currentColor" d="M7.5 5.6L5 7l1.4-2.5L5 2l2.5 1.4L10 2L8.6 4.5L10 7zm12 9.8L22 14l-1.4 2.5L22 19l-2.5-1.4L17 19l1.4-2.5L17 14zM22 2l-1.4 2.5L22 7l-2.5-1.4L17 7l1.4-2.5L17 2l2.5 1.4zm-8.66 10.78l2.44-2.44l-2.12-2.12l-2.44 2.44zm1.03-5.49l2.34 2.34c.39.37.39 1.02 0 1.41L5.04 22.71c-.39.39-1.04.39-1.41 0l-2.34-2.34c-.39-.37-.39-1.02 0-1.41L12.96 7.29c.39-.39 1.04-.39 1.41 0" />
          </svg>
        </button>
      </div>
      <div class="right-buttons">
        <button id="reloadBtn" title="Запустить">Запустить</button>
      </div>
    </div>
    <div class="wrap">
      <div class="panel left">
        <textarea id="code">
<!doctype html>
<html>
<head>
<style>
.btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 10px 5px;
}

.chevron {
  transition: transform 0.3s ease;
}

.chevron.active {
  transform: rotate(180deg);
}

.content {
  display: none;
  margin-top: 5px;
}

.content.open {
  display: block;
}
</style>
</head>
<body>

<button class="btn"><span class="btn-text">Показать</span><span class="chevron">▼</span></button>

<div class="content">Содержимое спойлера</div>

<script>
const btn = document.querySelector(".btn");
const btnText = document.querySelector(".btn-text");
const chevron = document.querySelector(".chevron");
const content = document.querySelector(".content");

btn.addEventListener("click", function() {
  content.classList.toggle("open");
  chevron.classList.toggle("active");
  btnText.textContent = content.classList.contains("open") ? "Скрыть" : "Показать";
});
