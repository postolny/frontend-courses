<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обход элементов коллекции с помощью цикла for</title>
  <link rel="stylesheet" href="../assets/codemirror/lib/codemirror.css">
  <link rel="stylesheet" href="../assets/codemirror/theme/ayu-dark.css">
  <link rel="stylesheet" href="../assets/codemirror/theme/eclipse.css">
  <link rel="stylesheet" href="../assets/editor.css">
</head>

<body>
  <div class="page">
    <div class="header">
      <div class="left-buttons">
        <a class="exit" href="#" title="К списку уроков">
          <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
            <path d="M0 0h24v24H0z" fill="none" />
            <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
              <path d="M5 12H3l9-9l9 9h-2M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7" />
              <path d="M9 21v-6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v6" />
            </g>
          </svg>
        </a>
        <button onclick="toggleTheme()" class="btn" title="Переключить тему">
          <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
            <path d="M0 0h24v24H0z" fill="none" />
            <path fill="currentColor" d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2S2 6.477 2 12s4.477 10 10 10m0-1.5v-17a8.5 8.5 0 0 1 0 17" />
          </svg>
        </button>
        <button id="copyBtn" class="btn" title="Копировать">
          <svg id="iconCopy" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
            <path d="M0 0h24v24H0z" fill="none" />
            <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
              <path d="M7 9.667A2.667 2.667 0 0 1 9.667 7h8.666A2.667 2.667 0 0 1 21 9.667v8.666A2.667 2.667 0 0 1 18.333 21H9.667A2.667 2.667 0 0 1 7 18.333z" />
              <path d="M4.012 16.737A2 2 0 0 1 3 15V5c0-1.1.9-2 2-2h10c.75 0 1.158.385 1.5 1" />
            </g>
          </svg>
          <svg id="iconCheck" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" style="display:none;">
            <path d="M0 0h24v24H0z" fill="none" />
            <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m5 12l5 5L20 7" />
          </svg>
        </button>
        <button id="formatBtn" class="btn" title="Форматировать">
          <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
            <path d="M0 0h24v24H0z" fill="none" />
            <path fill="currentColor" d="M7.5 5.6L5 7l1.4-2.5L5 2l2.5 1.4L10 2L8.6 4.5L10 7zm12 9.8L22 14l-1.4 2.5L22 19l-2.5-1.4L17 19l1.4-2.5L17 14zM22 2l-1.4 2.5L22 7l-2.5-1.4L17 7l1.4-2.5L17 2l2.5 1.4zm-8.66 10.78l2.44-2.44l-2.12-2.12l-2.44 2.44zm1.03-5.49l2.34 2.34c.39.37.39 1.02 0 1.41L5.04 22.71c-.39.39-1.04.39-1.41 0l-2.34-2.34c-.39-.37-.39-1.02 0-1.41L12.96 7.29c.39-.39 1.04-.39 1.41 0" />
          </svg>
        </button>
      </div>
      <div class="right-buttons">
        <button id="reloadBtn" title="Запустить">Запустить</button>
      </div>
    </div>
    <div class="wrap">
      <div class="panel left">
        <textarea id="code">
<!doctype html>
<html>
<body>

<div id="result"></div>

<br>

<div class="box"></div>
<div class="box"></div>
<div class="box"></div>

<br>

<ul>
  <li class="item">Пункт</li>
  <li class="item">Пункт</li>
  <li class="item">Пункт</li>
</ul>

<button id="btn">Пронумеровать</button>

<script>
// цикл будет выполняться 10 раз, изначально значение переменной i будет 0, за каждую итерацию цикла значение будет увеличиваться на единицу и так будет происходить до тех пор, пока i будет меньше, чем число 10
let result = document.getElementById("result");
for(let i = 0; i < 10; i++) {
  console.log(i);
  result.textContent += i + " "; // с оператором присваивания +=
  // эквивалентна
  // result.textContent = result.textContent + i + " ";
  // result.innerHTML += i + "<br>"; // добавляем перенос
  // с использованием шаблонной строки
  // result.innerHTML += `${i}<br>`;
}

const boxes = document.querySelectorAll(".box");

for (let i = 0; i < boxes.length; i++) {
  boxes[i].textContent = "Привет!";
}

const btn = document.querySelector("#btn");
const items = document.querySelectorAll(".item");

btn.addEventListener("click", () => {
  for (let i = 0; i < items.length; i++) {
    /* к индексу прибавляем 1, чтобы получилось Пункт 1 Пункт 2 Пункт 3,
    а не Пункт 0 Пункт 1 Пункт 2, поскольку индекс начинается с 0 */
    items[i].textContent = "Пункт " + (i + 1);
    // или в обратных кавычках (шаблонная строка)
    // items[i].textContent = `Пункт ${i + 1}`;
  }
});
</script>

</body>
</html>
        </textarea>
      </div>
      <div class="panel right">
        <iframe id="output"></iframe>
      </div>
    </div>
  </div>
  <script src="../assets/codemirror/lib/codemirror.js"></script>
  <script src="../assets/codemirror/mode/xml/xml.js"></script>
  <script src="../assets/codemirror/mode/javascript/javascript.js"></script>
  <script src="../assets/codemirror/mode/css/css.js"></script>
  <script src="../assets/codemirror/mode/htmlmixed/htmlmixed.js"></script>
  <script src="../assets/codemirror/addon/edit/closetag.js"></script>
  <script src="../assets/codemirror/addon/edit/closebrackets.js"></script>
  <script src="../assets/codemirror/addon/selection/active-line.js"></script>
  <script src="../assets/prettier/standalone.js"></script>
  <script src="../assets/prettier/plugins/html.js"></script>
  <script src="../assets/prettier/plugins/babel.js"></script>
  <script src="../assets/prettier/plugins/postcss.js"></script>
  <script src="../assets/editor.js"></script>
</body>

</html>
